services:
  api:
    image: ghcr.io/myeungdev/dingding:main
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    devices:
      # Expose audio device so the alarm sound can play
      - /dev/snd:/dev/snd

  mcp:
    image: ghcr.io/myeungdev/dingding-mcp:main
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      MCP_TRANSPORT: httpStream
      MCP_PORT: 3001
